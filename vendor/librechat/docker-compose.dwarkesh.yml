services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dwarkesh-librechat
    ports:
      - "${PORT:-3080}:${PORT:-3080}"
    depends_on:
      - mongodb
      - meilisearch
    restart: always
    env_file:
      - ./.env.dwarkesh
    environment:
      HOST: 0.0.0.0
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/LibreChat
      MEILI_HOST: http://meilisearch:7700
      CONFIG_PATH: /app/librechat.yaml
    volumes:
      - ./librechat.yaml:/app/librechat.yaml:ro
      - ./images:/app/client/public/images
      - ./uploads:/app/uploads
      - ./logs:/app/api/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mongodb:
    container_name: dwarkesh-mongodb
    image: mongo:8.0.20
    restart: always
    volumes:
      - ./data-node:/data/db
    command: mongod --noauth

  meilisearch:
    container_name: dwarkesh-meilisearch
    image: getmeili/meilisearch:v1.35.1
    restart: always
    env_file:
      - ./.env.dwarkesh
    environment:
      MEILI_HOST: http://meilisearch:7700
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    volumes:
      - ./meili_data_v1.35.1:/meili_data
